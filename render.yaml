databases:
  - name: np-land-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: np-land-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9   # psycopg2-binary chưa hỗ trợ Python 3.14 (default của Render) -> lỗi undefined symbol
      - key: DATABASE_URL
        fromDatabase:
          name: np-land-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CLAUDE_API_KEY
        sync: false   # điền tay trong Render Dashboard (không commit key vào git)
      - key: CLOUDINARY_URL
        sync: false   # điền tay trong Render Dashboard, lấy từ Cloudinary Dashboard > "API Environment variable"

  - type: web
    name: np-land-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: np-land-backend
          property: host  # Render tự điền dạng "https://np-land-backend.onrender.com" khi build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
